name: BuildLab
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
    - "app/**.*" 
permissions: read-all     
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Install JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    - name: Build the lab app
      run: cd app; mvn clean package --file pom.xml
